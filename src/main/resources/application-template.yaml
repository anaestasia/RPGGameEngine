# ===========================
# Base de données
# ===========================
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/db_rpggameengine_api?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
    username: YOUR_USERNAME
    password: YOUR_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# ===========================
# Flyway
# ===========================
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: alpha

server:
  port: 8080